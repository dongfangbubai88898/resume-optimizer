<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI简历优化助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* Header */
    header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff; padding: 40px 0 30px; text-align: center; }
    header h1 { font-size: 28px; margin-bottom: 8px; }
    header p { opacity: .85; font-size: 15px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin: 20px 0 0; background: #fff; border-radius: 10px 10px 0 0; overflow: hidden; }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 500; color: #666; transition: all .2s; border-bottom: 3px solid transparent; }
    .tab:hover { background: #f5f7fa; }
    .tab.active { color: #1a73e8; border-bottom-color: #1a73e8; background: #f0f7ff; }

    /* Main content */
    .main-content { background: #fff; border-radius: 0 0 10px 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; color: #444; font-size: 14px; }
    textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border .2s; }
    textarea:focus, select:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,.1); }
    textarea { min-height: 180px; resize: vertical; line-height: 1.6; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 768px) { .row { grid-template-columns: 1fr; } }

    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: all .2s; }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; transform: translateY(-1px); }
    .btn-primary:disabled { background: #93b9f5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #e8f0fe; color: #1a73e8; }
    .btn-secondary:hover { background: #d2e3fc; }
    .btn-success { background: #0f9d58; color: #fff; }
    .btn-success:hover { background: #0b8043; }

    /* Loading */
    .loading { display: none; align-items: center; gap: 10px; padding: 12px 0; color: #666; font-size: 14px; }
    .loading.active { display: flex; }
    .spinner { width: 20px; height: 20px; border: 2.5px solid #e0e0e0; border-top-color: #1a73e8; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    .result { margin-top: 20px; padding: 20px; border-radius: 10px; background: #f8f9fa; border: 1px solid #e8e8e8; display: none; }
    .result.active { display: block; }
    .result h3 { font-size: 16px; margin-bottom: 12px; color: #1a73e8; }
    .result-section { margin-bottom: 16px; }
    .result-section:last-child { margin-bottom: 0; }
    .result-section h4 { font-size: 14px; color: #555; margin-bottom: 8px; }
    .result-section p, .result-section li { font-size: 14px; line-height: 1.7; color: #333; }
    .result-section ul { padding-left: 20px; }
    .result-section li { margin-bottom: 4px; }

    .score-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 20px; font-weight: 700; }
    .score-high { background: #e6f4ea; color: #0f9d58; }
    .score-mid { background: #fef7e0; color: #e37400; }
    .score-low { background: #fce8e6; color: #c5221f; }

    .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin: 2px 4px 2px 0; }
    .tag-green { background: #e6f4ea; color: #0f9d58; }
    .tag-red { background: #fce8e6; color: #c5221f; }
    .tag-blue { background: #e8f0fe; color: #1a73e8; }

    .optimized-resume { white-space: pre-wrap; font-size: 14px; line-height: 1.8; padding: 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; }

    /* Quick tips */
    .tips { margin-top: 16px; padding: 14px 18px; background: #e8f0fe; border-radius: 8px; font-size: 13px; color: #1a73e8; }
    .tips strong { font-weight: 600; }
    .tips ul { margin-top: 6px; padding-left: 18px; }
    .tips li { margin-bottom: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>📄 AI简历优化助手</h1>
    <p>上传简历 · 匹配JD · AI深度优化</p>
  </header>

  <div class="container">
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="full">✨ 一键优化</div>
      <div class="tab" data-tab="diagnose">🔍 简历诊断</div>
      <div class="tab" data-tab="match">🎯 JD匹配</div>
      <div class="tab" data-tab="optimize">✏️ 润色优化</div>
    </div>

    <div class="main-content">
      <!-- 一键优化 -->
      <div class="tab-content active" id="tab-full">
        <div class="form-group">
          <label>粘贴简历内容 <span style="color:#999;font-weight:400;">（复制粘贴即可，不限格式）</span></label>
          <textarea id="full-resume" placeholder="粘贴你的简历内容...&#10;&#10;示例：&#10;张三 | 本科 | 3年前端开发经验&#10;熟练掌握 Vue.js、React、TypeScript&#10;..."></textarea>
        </div>
        <div class="form-group">
          <label>粘贴目标JD <span style="color:#999;font-weight:400;">（可选，留空则通用优化）</span></label>
          <textarea id="full-jd" placeholder="粘贴职位描述...&#10;&#10;示例：&#10;高级前端工程师&#10;岗位要求：&#10;1. 精通 React/Vue 等框架&#10;2. 有大型项目经验"></textarea>
        </div>
        <div class="tips">
          <strong>💡 小提示：</strong> 同时提供简历和JD效果最佳！AI会做匹配度分析并针对性优化。
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" id="btn-full" onclick="fullOptimize()">✨ 一键优化</button>
          <div class="loading" id="loading-full"><div class="spinner"></div> AI正在分析优化中，请稍候...</div>
        </div>
        <div class="result" id="result-full"></div>
      </div>

      <!-- 简历诊断 -->
      <div class="tab-content" id="tab-diagnose">
        <div class="form-group">
          <label>粘贴简历内容</label>
          <textarea id="diag-resume" placeholder="粘贴简历内容..."></textarea>
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" onclick="diagnose()">🔍 开始诊断</button>
          <div class="loading" id="loading-diag"><div class="spinner"></div> AI正在诊断...</div>
        </div>
        <div class="result" id="result-diag"></div>
      </div>

      <!-- JD匹配 -->
      <div class="tab-content" id="tab-match">
        <div class="row">
          <div class="form-group">
            <label>简历内容</label>
            <textarea id="match-resume" placeholder="粘贴简历..."></textarea>
          </div>
          <div class="form-group">
            <label>职位描述 (JD)</label>
            <textarea id="match-jd" placeholder="粘贴JD..."></textarea>
          </div>
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" onclick="matchJD()">🎯 分析匹配度</button>
          <div class="loading" id="loading-match"><div class="spinner"></div> AI正在分析匹配度...</div>
        </div>
        <div class="result" id="result-match"></div>
      </div>

      <!-- 润色优化 -->
      <div class="tab-content" id="tab-optimize">
        <div class="row">
          <div class="form-group">
            <label>简历内容</label>
            <textarea id="opt-resume" placeholder="粘贴简历..."></textarea>
          </div>
          <div class="form-group">
            <label>目标JD <span style="color:#999;font-weight:400;">（可选）</span></label>
            <textarea id="opt-jd" placeholder="粘贴JD（可选，留空则通用优化）..."></textarea>
          </div>
        </div>
        <div class="form-group">
          <label>优化风格</label>
          <select id="opt-style">
            <option value="professional">专业正式（推荐）</option>
            <option value="concise">极简精炼</option>
            <option value="creative">创意个性</option>
          </select>
        </div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" onclick="optimize()">✏️ AI润色</button>
          <div class="loading" id="loading-opt"><div class="spinner"></div> AI正在优化简历...</div>
        </div>
        <div class="result" id="result-opt"></div>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.classList.add('active');
      el.innerHTML = `<div class="result-section"><p style="color:#c5221f;">❌ ${msg}</p></div>`;
    }

    async function apiCall(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `请求失败 (${res.status})`);
      }
      return await res.json();
    }

    // 一键优化
    async function fullOptimize() {
      const resume = document.getElementById('full-resume').value.trim();
      const jd = document.getElementById('full-jd').value.trim();
      if (!resume) { alert('请先粘贴简历内容'); return; }

      const btn = document.getElementById('btn-full');
      const loading = document.getElementById('loading-full');
      const result = document.getElementById('result-full');
      btn.disabled = true;
      loading.classList.add('active');
      result.classList.remove('active');

      try {
        const data = await apiCall('/api/full-optimize', { resume, jd: jd || undefined });

        if (data.error) {
          result.innerHTML = `<p style="color:#c5221f;">❌ ${data.error}</p>`;
          result.classList.add('active');
          return;
        }

        const d = data.diagnosis || {};
        const m = data.match || {};
        const o = data.optimized || {};

        let html = '<h3>📊 优化结果报告</h3>';

        // 诊断
        html += '<div class="result-section"><h4>🔍 简历诊断</h4>';
        if (d.score !== undefined) {
          const cls = d.score >= 70 ? 'score-high' : d.score >= 50 ? 'score-mid' : 'score-low';
          html += `<p>评分：<span class="score-badge ${cls}">${d.score}/100</span></p>`;
        }
        if (d.summary) html += `<p style="margin-top:8px;">${d.summary}</p>`;
        if (d.strengths?.length) html += `<p style="margin-top:8px;"><strong>✅ 优点：</strong></p><ul>${d.strengths.map(s => `<li>${s}</li>`).join('')}</ul>`;
        if (d.weaknesses?.length) html += `<p><strong>⚠️ 待改进：</strong></p><ul>${d.weaknesses.map(s => `<li style="color:#c5221f;">${s}</li>`).join('')}</ul>`;
        html += '</div>';

        // 匹配
        if (m.matchScore !== undefined) {
          html += '<div class="result-section"><h4>🎯 JD匹配度</h4>';
          const cls = m.matchScore >= 70 ? 'score-high' : m.matchScore >= 50 ? 'score-mid' : 'score-low';
          html += `<p>匹配度：<span class="score-badge ${cls}">${m.matchScore}%</span></p>`;
          if (m.summary) html += `<p>${m.summary}</p>`;
          if (m.matchedSkills?.length) html += `<p><strong>✅ 匹配项：</strong> ${m.matchedSkills.map(s => `<span class="tag tag-green">${s}</span>`).join('')}</p>`;
          if (m.missingSkills?.length) html += `<p><strong>❌ 缺失项：</strong> ${m.missingSkills.map(s => `<span class="tag tag-red">${s}</span>`).join('')}</p>`;
          html += '</div>';
        }

        // 优化
        if (o.resume) {
          html += '<div class="result-section"><h4>✏️ 优化后简历</h4>';
          if (o.changes?.length) html += `<p><strong>主要修改：</strong></p><ul>${o.changes.map(c => `<li>${c}</li>`).join('')}</ul>`;
          html += `<div class="optimized-resume" style="margin-top:10px;">${o.resume}</div>`;
          if (o.improvements?.length) html += `<p style="margin-top:10px;"><strong>优化亮点：</strong></p><ul>${o.improvements.map(i => `<li>${i}</li>`).join('')}</ul>`;
          html += '</div>';
        }

        result.innerHTML = html;
        result.classList.add('active');
      } catch (err) {
        showError('result-full', err.message);
      } finally {
        btn.disabled = false;
        loading.classList.remove('active');
      }
    }

    // 简历诊断
    async function diagnose() {
      const resume = document.getElementById('diag-resume').value.trim();
      if (!resume) { alert('请先粘贴简历内容'); return; }

      const btn = document.querySelector('#tab-diagnose .btn');
      const loading = document.getElementById('loading-diag');
      const result = document.getElementById('result-diag');
      btn.disabled = true;
      loading.classList.add('active');
      result.classList.remove('active');

      try {
        const data = await apiCall('/api/analyze', { resume });
        const cls = data.score >= 70 ? 'score-high' : data.score >= 50 ? 'score-mid' : 'score-low';
        let html = '<h3>🔍 简历诊断报告</h3>';
        html += `<div class="result-section"><p>评分：<span class="score-badge ${cls}">${data.score}/100</span></p>`;
        if (data.summary) html += `<p style="margin-top:8px;">${data.summary}</p></div>`;
        if (data.strengths?.length) {
          html += `<div class="result-section"><h4>✅ 优点</h4><ul>${data.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
        }
        if (data.weaknesses?.length) {
          html += `<div class="result-section"><h4>⚠️ 待改进</h4><ul>${data.weaknesses.map(s => `<li style="color:#c5221f;">${s}</li>`).join('')}</ul></div>`;
        }
        if (data.suggestions?.length) {
          html += `<div class="result-section"><h4>💡 改进建议</h4><ul>${data.suggestions.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
        }
        result.innerHTML = html;
        result.classList.add('active');
      } catch (err) {
        showError('result-diag', err.message);
      } finally {
        btn.disabled = false;
        loading.classList.remove('active');
      }
    }

    // JD匹配
    async function matchJD() {
      const resume = document.getElementById('match-resume').value.trim();
      const jd = document.getElementById('match-jd').value.trim();
      if (!resume || !jd) { alert('请同时填写简历和JD'); return; }

      const btn = document.querySelector('#tab-match .btn');
      const loading = document.getElementById('loading-match');
      const result = document.getElementById('result-match');
      btn.disabled = true;
      loading.classList.add('active');
      result.classList.remove('active');

      try {
        const data = await apiCall('/api/match', { resume, jd });
        const cls = data.matchScore >= 70 ? 'score-high' : data.matchScore >= 50 ? 'score-mid' : 'score-low';
        let html = '<h3>🎯 匹配度分析</h3>';
        html += `<div class="result-section"><p>匹配度：<span class="score-badge ${cls}">${data.matchScore}%</span></p>`;
        if (data.summary) html += `<p style="margin-top:8px;">${data.summary}</p></div>`;
        if (data.matchedSkills?.length) {
          html += `<div class="result-section"><h4>✅ 匹配的技能/经验</h4><p>${data.matchedSkills.map(s => `<span class="tag tag-green">${s}</span>`).join('')}</p></div>`;
        }
        if (data.missingSkills?.length) {
          html += `<div class="result-section"><h4>❌ 缺失的技能/经验</h4><p>${data.missingSkills.map(s => `<span class="tag tag-red">${s}</span>`).join('')}</p></div>`;
        }
        if (data.suggestions?.length) {
          html += `<div class="result-section"><h4>💡 优化建议</h4><ul>${data.suggestions.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
        }
        result.innerHTML = html;
        result.classList.add('active');
      } catch (err) {
        showError('result-match', err.message);
      } finally {
        btn.disabled = false;
        loading.classList.remove('active');
      }
    }

    // 润色优化
    async function optimize() {
      const resume = document.getElementById('opt-resume').value.trim();
      const jd = document.getElementById('opt-jd').value.trim();
      const style = document.getElementById('opt-style').value;
      if (!resume) { alert('请先粘贴简历内容'); return; }

      const btn = document.querySelector('#tab-optimize .btn');
      const loading = document.getElementById('loading-opt');
      const result = document.getElementById('result-opt');
      btn.disabled = true;
      loading.classList.add('active');
      result.classList.remove('active');

      try {
        const data = await apiCall('/api/optimize', { resume, jd: jd || undefined, style });
        let html = '<h3>✏️ 优化结果</h3>';
        if (data.changes?.length) {
          html += `<div class="result-section"><h4>📝 主要修改</h4><ul>${data.changes.map(c => `<li>${c}</li>`).join('')}</ul></div>`;
        }
        if (data.optimizedResume) {
          html += `<div class="result-section"><h4>优化后简历</h4><div class="optimized-resume">${data.optimizedResume}</div></div>`;
        }
        if (data.improvements?.length) {
          html += `<div class="result-section"><h4>💡 优化亮点</h4><ul>${data.improvements.map(i => `<li>${i}</li>`).join('')}</ul></div>`;
        }
        result.innerHTML = html;
        result.classList.add('active');
      } catch (err) {
        showError('result-opt', err.message);
      } finally {
        btn.disabled = false;
        loading.classList.remove('active');
      }
    }
  </script>
</body>
</html>
